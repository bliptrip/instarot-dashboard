# Instarot MQTT Broker Configuration
# Place at: /etc/mosquitto/conf.d/instarot.conf

# ── Standard MQTT (for ESP32 devices) ──
listener 1883
protocol mqtt

# ── WebSocket MQTT (for browser dashboard) ──
listener 9001
protocol websockets

# ── General Settings ──
allow_anonymous true
# For a home network this is fine. If exposed to the internet,
# set up username/password authentication:
#   password_file /etc/mosquitto/passwd
#   allow_anonymous false

# Persistence (survive broker restarts)
persistence true
persistence_location /var/lib/mosquitto/

# Logging (keep minimal)
log_dest syslog
log_type error
log_type warning
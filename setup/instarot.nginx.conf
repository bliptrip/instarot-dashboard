server {
    listen 80;
    server_name _;

    # Serve the React build
    root /var/www/instarot;
    index index.html;

    # React app — serve index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — proxy to Flask
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # SSE stream — critical: disable buffering or events won't flow
    location /stream {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /stream-pids {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }
}